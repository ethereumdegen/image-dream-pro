<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Image Dream Pro</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">ID</div>
        <div class="brand-text">
          <div class="brand-title">Image Dream</div>
          <div class="brand-sub">
            Pro
            <span id="brand-version" class="brand-version">v…</span>
          </div>
        </div>
        <button
          id="sidebar-toggle"
          class="sidebar-toggle"
          type="button"
          aria-label="Toggle sidebar"
          title="Collapse sidebar"
        >
          &laquo;
        </button>
      </div>
      <nav class="nav">
        <button class="nav-item" data-page="editor" title="Editor">
          <span class="nav-icon">E</span><span class="nav-label">Editor</span>
        </button>
        <button class="nav-item active" data-page="models" title="Models">
          <span class="nav-icon">M</span><span class="nav-label">Models</span>
        </button>
        <button class="nav-item" data-page="library" title="Media Library">
          <span class="nav-icon">L</span><span class="nav-label">Media Library</span>
        </button>
        <button class="nav-item" data-page="settings" title="Settings">
          <span class="nav-icon">S</span><span class="nav-label">Settings</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <span id="api-key-status" class="status-pill">No API key</span>
        <span id="active-jobs-status" class="status-pill">Idle</span>
      </div>
    </aside>

    <main class="main">
      <section id="page-editor" class="page"></section>
      <section id="page-models" class="page active"></section>
      <section id="page-library" class="page"></section>
      <section id="page-settings" class="page"></section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
