<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Image Dream Pro</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">ID</div>
        <div class="brand-text">
          <div class="brand-title">Image Dream</div>
          <div class="brand-sub">Pro</div>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-page="models">
          <span class="nav-icon">M</span><span>Models</span>
        </button>
        <button class="nav-item" data-page="library">
          <span class="nav-icon">L</span><span>Media Library</span>
        </button>
        <button class="nav-item" data-page="settings">
          <span class="nav-icon">S</span><span>Settings</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <span id="api-key-status" class="status-pill">No API key</span>
        <span id="active-jobs-status" class="status-pill">Idle</span>
      </div>
    </aside>

    <main class="main">
      <section id="page-models" class="page active"></section>
      <section id="page-library" class="page"></section>
      <section id="page-settings" class="page"></section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
